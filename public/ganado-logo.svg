<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Círculo exterior con borde verde -->
  <circle cx="60" cy="60" r="56" stroke="#2D6A2D" stroke-width="3" fill="white" fill-opacity="0.0"/>

  <!-- Señal WiFi (3 arcos centrados arriba de la vaca) -->
  <path d="M48 28 Q60 20 72 28" stroke="#2D6A2D" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M52.5 33.5 Q60 27.5 67.5 33.5" stroke="#2D6A2D" stroke-width="2.8" stroke-linecap="round"/>
  <circle cx="60" cy="38.5" r="2.2" fill="#2D6A2D"/>

  <!-- Cuello / cuerpo superior de la vaca -->
  <path d="M48 75 Q60 72 72 75 L70 88 Q60 92 50 88 Z" fill="#2D6A2D"/>

  <!-- Cabeza vaca (oval) -->
  <ellipse cx="60" cy="62" rx="18" ry="16" fill="#2D6A2D"/>

  <!-- Orejas -->
  <ellipse cx="40" cy="59" rx="6" ry="5" fill="#2D6A2D"/>
  <ellipse cx="80" cy="59" rx="6" ry="5" fill="#2D6A2D"/>
  <!-- Interior orejas -->
  <ellipse cx="40" cy="59" rx="3.5" ry="3" fill="#5a9e5a"/>
  <ellipse cx="80" cy="59" rx="3.5" ry="3" fill="#5a9e5a"/>

  <!-- Hocico (más grande y redondeado) -->
  <ellipse cx="60" cy="68" rx="11" ry="8" fill="#f5f0eb"/>

  <!-- Ojos -->
  <circle cx="53" cy="57" r="3" fill="white"/>
  <circle cx="67" cy="57" r="3" fill="white"/>
  <circle cx="53.8" cy="57.8" r="1.5" fill="#1a3d1a"/>
  <circle cx="67.8" cy="57.8" r="1.5" fill="#1a3d1a"/>
  <!-- Brillo ojos -->
  <circle cx="54.5" cy="57" r="0.6" fill="white"/>
  <circle cx="68.5" cy="57" r="0.6" fill="white"/>

  <!-- Fosas nasales -->
  <ellipse cx="55.5" cy="69" rx="2.5" ry="1.8" fill="#c9b89a"/>
  <ellipse cx="64.5" cy="69" rx="2.5" ry="1.8" fill="#c9b89a"/>

  <!-- Hoja izquierda -->
  <path d="M28 82 C22 70 30 62 36 65 C30 72 34 80 40 80 C34 86 28 84 28 82Z" fill="#4caf50"/>
  <path d="M36 65 C32 72 34 80 40 80" stroke="#2D6A2D" stroke-width="1" stroke-linecap="round"/>

  <!-- Hoja derecha -->
  <path d="M92 82 C98 70 90 62 84 65 C90 72 86 80 80 80 C86 86 92 84 92 82Z" fill="#4caf50"/>
  <path d="M84 65 C88 72 86 80 80 80" stroke="#2D6A2D" stroke-width="1" stroke-linecap="round"/>

</svg>
